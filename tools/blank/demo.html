<!doctype html>
<meta charset="utf-8">
<title>New File — demo</title>
<style>
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 34rem; margin: 3rem auto; padding: 0 1rem; }
  button { font: inherit; margin: .25rem; padding: .5rem 1rem; }
  input { font: inherit; padding: .35rem; }
</style>

<h1>New File — demo</h1>
<p>Empty files generated fully in-browser — the OOXML trio are hand-rolled
minimal ECMA-376 packages.</p>

<p><label>File name <input id="name" placeholder="Untitled"></label></p>
<div id="grid"></div>

<script type="module">
  import { FORMATS, fileName } from './blank-files.js';

  const grid = document.getElementById('grid');
  for (const ext of Object.keys(FORMATS)) {
    const b = document.createElement('button');
    b.textContent = '.' + ext;
    b.onclick = () => {
      const f = FORMATS[ext];
      const url = URL.createObjectURL(new Blob([f.make()], { type: f.mime }));
      const a = Object.assign(document.createElement('a'), {
        href: url, download: fileName(document.getElementById('name').value, ext),
      });
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    };
    grid.appendChild(b);
  }
</script>
