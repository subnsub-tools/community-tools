<!doctype html>
<meta charset="utf-8">
<title>PDF Tools — demo</title>
<style>
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 34rem; margin: 3rem auto; padding: 0 1rem; }
  label { display: block; margin: .75rem 0; }
  .err { color: #b00020; }
</style>

<h1>PDF Tools — demo</h1>
<p>Merge PDFs, extract pages, or turn images into a PDF — all in browser
memory. pdf-lib loads from a CDN; nothing is uploaded anywhere.</p>

<label>Mode
  <select id="mode">
    <option value="merge">Merge PDFs (pick 2+)</option>
    <option value="extract">Extract pages (pick 1)</option>
    <option value="images">Images → PDF</option>
  </select>
</label>
<label>Files <input type="file" id="file" multiple></label>
<label id="rangeRow" hidden>Page range <input id="range" placeholder="1-3, 7, 12-"></label>
<button id="run">Run</button>
<p id="status"></p>

<!-- library code only — your files still never leave the page -->
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"
        integrity="sha384-weMABwrltA6jWR8DDe9Jp5blk+tZQh7ugpCsF3JwSA53WZM9/14PjS5LAJNHNjAI"
        crossorigin="anonymous"></script>
<script type="module">
  import { mergePdfs, extractPages, imagesToPdf } from './pdf-tools.js';

  const $ = (id) => document.getElementById(id);
  const status = (m, e) => { $('status').textContent = m; $('status').className = e ? 'err' : ''; };
  $('mode').onchange = () => { $('rangeRow').hidden = $('mode').value !== 'extract'; };

  $('run').onclick = async () => {
    const files = [...$('file').files];
    if (!files.length) return status('Pick file(s) first.', true);
    status('Working…');
    try {
      const inputs = [];
      for (const f of files) inputs.push({ bytes: new Uint8Array(await f.arrayBuffer()), name: f.name });
      const mode = $('mode').value;
      const r = mode === 'merge' ? await mergePdfs(PDFLib, inputs)
        : mode === 'extract' ? await extractPages(PDFLib, inputs[0].bytes, inputs[0].name, $('range').value)
        : await imagesToPdf(PDFLib, inputs, { pageSize: 'orig' });
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([r.bytes], { type: 'application/pdf' })),
        download: mode + '.pdf',
      });
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
      status(`Done — ${r.pages} page(s).`);
    } catch (e) {
      status(`Failed (${e.code || e.message})${e.fileName ? ': ' + e.fileName : ''}`, true);
    }
  };
</script>
